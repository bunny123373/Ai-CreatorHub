<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="url(#grad1)"/>
  <!-- Creative wand/magic tool icon -->
  <g transform="translate(32,32)">
    <!-- Wand handle -->
    <rect x="-3" y="-20" width="6" height="28" rx="3" fill="url(#grad2)" transform="rotate(-45)"/>
    <!-- Sparkle/star at tip -->
    <path d="M10,-10 L12,-4 L18,-2 L14,2 L15,8 L10,5 L5,8 L6,2 L2,-2 L8,-4 Z" 
          fill="white" opacity="0.9"/>
    <!-- AI circuit lines -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <!-- Small dots representing content -->
    <circle cx="-8" cy="-8" r="2" fill="white" opacity="0.7"/>
    <circle cx="8" cy="-8" r="2" fill="white" opacity="0.7"/>
    <circle cx="-8" cy="8" r="2" fill="white" opacity="0.7"/>
    <circle cx="8" cy="8" r="2" fill="white" opacity="0.7"/>
  </g>
</svg>
